version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=34.58.12.77,localhost,127.0.0.1
      - DATABASE_URL=sqlite:///db.sqlite3
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend/movie-app
      args:
        - VITE_API_BASE_URL=http://34.58.12.77/api
    restart: always
    volumes:
      - frontend_dist:/app/dist
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend

volumes:
  backend_media:
  backend_static:
  frontend_dist:
